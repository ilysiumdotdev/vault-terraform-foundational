name: vector
secrets_engines:
  kv:
    path: vector
auth_backends:
  kubernetes:
    vector:
      role_name: vector
      bound_service_account_names: ["vector-secrets-reader"]
      bound_service_account_namespaces: ["vector"]
      token_policy_keys: ["kv-read"]
policies:
  kv-read:
    name: vector-kv-read
    template: kv-read
